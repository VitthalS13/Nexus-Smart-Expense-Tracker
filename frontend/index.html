<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Smart Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>Nexus</h1>
            <p class="subtitle">Intelligent Wealth Management</p>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Login</button>
                <button class="tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <!-- REGISTER FORM -->
            <form id="register-form" class="auth-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required placeholder="Create a strong password">
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div id="auth-error" class="error-msg"></div>
        </div>
        
        <div class="auth-hero">
            <div class="glass-orb"></div>
            <h2>Take Control.</h2>
            <p>Automated tracking, AI analytics, and unlimited virtual cards.</p>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Redirect to dashboard if logged in
        if (localStorage.getItem("nexus_user_id")) {
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
